name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The `jib` task graph is compile → jar → push: it never runs a test. So
      # without this step a red suite deployed to prod unnoticed, and the tests
      # only ever ran on whichever laptop remembered to run them.
      - name: Build & test
        run: |
          chmod +x gradlew
          ./gradlew build

      # Jib builds one image per app module and pushes:
      #   ghcr.io/nplus-father/bookshelf-echo-{producers,enricher,matcher,digester,publisher}
      - name: Push all images with Jib
        run: ./gradlew jib

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            cd ~/workspace/bookshelf-echo
            echo "$GHCR_TOKEN" | docker login ghcr.io -u andrewnplus --password-stdin
            git pull --ff-only
            docker compose pull producers enricher matcher digester publisher
            docker compose up -d producers enricher matcher digester publisher
            # site-publisher runs a mounted script (config/site-publish.sh) as a
            # long-lived process — it reads the script once at start. `up -d` won't
            # touch it, so a script change would silently keep running the old copy
            # (caused the 2026-07-12 publishing outage). Restart to reload the script.
            docker compose restart site-publisher
            docker image prune -f
            echo "bookshelf-echo deploy completed at $(date)"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
